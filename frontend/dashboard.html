<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatMax - Agent Dashboard</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM (UMD build for browser) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .chat-scroll::-webkit-scrollbar { width: 6px; }
        .chat-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-100 h-screen overflow-hidden text-gray-800 font-sans">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Constants configurable for local dev
        const API_BASE_URL = "http://127.0.0.1:8000/api/v1";
        const WS_URL = "ws://127.0.0.1:8000/api/v1/ws/dashboard";

        function Dashboard() {
            const [wsStatus, setWsStatus] = useState('Connecting...');
            const [chats, setChats] = useState([]);
            const [selectedChatId, setSelectedChatId] = useState(null);
            const [replyText, setReplyText] = useState('');
            const wsRef = useRef(null);
            const chatEndRef = useRef(null);

            // Load existing open chats from DB-backed API on page load
            useEffect(() => {
                const loadChats = async () => {
                    try {
                        const res = await fetch(`${API_BASE_URL}/agent/chats`);
                        if (!res.ok) throw new Error(`Failed to load chats: ${res.status}`);
                        const data = await res.json();

                        const normalizedChats = (data.chats || []).map(chat => ({
                            ...chat,
                            messages: (chat.messages || []).map(m => ({
                                sender: m.sender,
                                content: m.content
                            }))
                        }));

                        setChats(normalizedChats);
                    } catch (err) {
                        console.error("Could not load chats from backend:", err);
                    }
                };

                loadChats();
            }, []);

            // Connect to WebSocket for real-time updates
            useEffect(() => {
                const ws = new WebSocket(WS_URL);
                wsRef.current = ws;

                ws.onopen = () => setWsStatus('🟢 Connected');
                ws.onclose = () => setWsStatus('🔴 Disconnected');
                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);

                    if (data.type === 'new_message') {
                        setChats(prev => {
                            const newMsg = { sender: data.sender, content: data.content };
                            const existingIdx = prev.findIndex(c => c.id === data.conversation_id);

                            if (existingIdx >= 0) {
                                return prev.map((chat, idx) =>
                                    idx === existingIdx
                                        ? {
                                            ...chat,
                                            status: data.status || chat.status,
                                            messages: [...(chat.messages || []), newMsg]
                                        }
                                        : chat
                                );
                            }

                            return [
                                ...prev,
                                {
                                    id: data.conversation_id,
                                    user_identifier: data.user_identifier,
                                    status: data.status,
                                    channel: data.channel,
                                    messages: [newMsg]
                                }
                            ];
                        });
                    }

                    if (data.type === 'status_change') {
                        setChats(prev =>
                            prev
                                .map(chat => chat.id === data.conversation_id ? { ...chat, status: data.new_status } : chat)
                                .filter(chat => chat.status !== 'CLOSED')
                        );

                        if (data.new_status === 'CLOSED') {
                            setSelectedChatId(current => current === data.conversation_id ? null : current);
                        }
                    }
                };

                return () => ws.close();
            }, []);

            // Auto-scroll chat
            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [chats, selectedChatId]);

            const selectedChat = chats.find(c => c.id === selectedChatId);
            const canReply = selectedChat && selectedChat.status === 'ACTIVE_HUMAN';

            const handleSend = async () => {
                if (!replyText.trim() || !selectedChat || !canReply) return;
                const outbound = replyText.trim();
                setReplyText('');

                try {
                    const res = await fetch(`${API_BASE_URL}/agent/reply`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            conversation_id: selectedChat.id,
                            recipient_identifier: selectedChat.user_identifier,
                            channel: selectedChat.channel,
                            content: outbound
                        })
                    });
                    if (!res.ok) throw new Error(`Failed to send reply: ${res.status}`);

                    setChats(prev => prev.map(chat =>
                        chat.id === selectedChatId
                            ? { ...chat, messages: [...(chat.messages || []), { sender: 'AGENT', content: outbound }] }
                            : chat
                    ));
                } catch (err) {
                    console.error("Failed to send agent reply:", err);
                    setReplyText(outbound);
                }
            };

            const acceptChat = async (id) => {
                const chat = chats.find(c => c.id === id);
                if (!chat) return;

                try {
                    const res = await fetch(`${API_BASE_URL}/agent/status`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            conversation_id: chat.id,
                            identifier: chat.user_identifier,
                            channel: chat.channel,
                            status: 'ACTIVE_HUMAN'
                        })
                    });
                    if (!res.ok) throw new Error(`Failed to accept chat: ${res.status}`);

                    setChats(prev => prev.map(c => c.id === id ? { ...c, status: 'ACTIVE_HUMAN' } : c));
                    setSelectedChatId(id);
                } catch (err) {
                    console.error("Failed to accept chat:", err);
                }
            };

            const resolveChat = async (id) => {
                const chat = chats.find(c => c.id === id);
                if (!chat) return;

                try {
                    const res = await fetch(`${API_BASE_URL}/agent/status`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            conversation_id: chat.id,
                            identifier: chat.user_identifier,
                            channel: chat.channel,
                            status: 'CLOSED'
                        })
                    });
                    if (!res.ok) throw new Error(`Failed to resolve chat: ${res.status}`);

                    setChats(prev => prev.filter(c => c.id !== id));
                    setSelectedChatId(null);
                } catch (err) {
                    console.error("Failed to resolve chat:", err);
                }
            };

            return (
                <div class="flex h-full">
                    {/* LEFT PANE: QUEUE */}
                    <div class="w-1/4 bg-white border-r flex flex-col">
                        <div class="p-4 bg-[#075E54] text-white flex justify-between items-center">
                            <h2 class="font-bold">Agent Inbox</h2>
                            <span class="text-xs px-2 py-1 bg-black/20 rounded">{wsStatus}</span>
                        </div>

                        <div class="p-2 border-b bg-gray-50 text-sm font-semibold text-gray-500">Auto Active (Bot)</div>
                        <div class="flex-1 overflow-y-auto chat-scroll">
                            {chats.filter(c => c.status === 'ACTIVE_AUTO').map(chat => (
                                <div key={chat.id}
                                    onClick={() => setSelectedChatId(chat.id)}
                                    class={`p-3 border-b hover:bg-gray-50 cursor-pointer flex justify-between items-center ${selectedChatId === chat.id ? 'bg-blue-50 border-l-4 border-blue-500' : ''}`}>
                                    <div>
                                        <div class="font-semibold text-sm">{chat.user_identifier}</div>
                                        <div class="text-xs text-gray-500">{chat.channel}</div>
                                    </div>
                                    <button
                                        onClick={(e) => { e.stopPropagation(); acceptChat(chat.id); }}
                                        class="text-xs bg-blue-500 text-white px-2 py-1 rounded"
                                    >
                                        Accept
                                    </button>
                                </div>
                            ))}
                        </div>

                        <div class="p-2 border-b bg-gray-50 text-sm font-semibold text-gray-500">Unassigned (Pending)</div>
                        <div class="flex-1 overflow-y-auto chat-scroll">
                            {chats.filter(c => c.status === 'PENDING_HUMAN').map(chat => (
                                <div key={chat.id}
                                    onClick={() => setSelectedChatId(chat.id)}
                                    class={`p-3 border-b hover:bg-gray-50 cursor-pointer flex justify-between items-center ${selectedChatId === chat.id ? 'bg-blue-50 border-l-4 border-blue-500' : ''}`}>
                                    <div>
                                        <div class="font-semibold text-sm">{chat.user_identifier}</div>
                                        <div class="text-xs text-gray-500">{chat.channel}</div>
                                    </div>
                                    <button
                                        onClick={(e) => { e.stopPropagation(); acceptChat(chat.id); }}
                                        class="text-xs bg-blue-500 text-white px-2 py-1 rounded"
                                    >
                                        Accept
                                    </button>
                                </div>
                            ))}
                        </div>

                        <div class="p-2 border-b bg-gray-50 text-sm font-semibold text-gray-500">My Active Chats</div>
                        <div class="flex-1 overflow-y-auto chat-scroll">
                            {chats.filter(c => c.status === 'ACTIVE_HUMAN').map(chat => (
                                <div key={chat.id}
                                    onClick={() => setSelectedChatId(chat.id)}
                                    class={`p-3 border-b hover:bg-gray-50 cursor-pointer ${selectedChatId === chat.id ? 'bg-blue-50 border-l-4 border-blue-500' : ''}`}>
                                    <div class="font-semibold text-sm">{chat.user_identifier}</div>
                                    <div class="text-xs text-gray-500 truncate">
                                        {chat.messages.length > 0 ? chat.messages[chat.messages.length-1].content : 'No messages yet'}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* MIDDLE PANE: CHAT WINDOW */}
                    <div class="w-2/4 flex flex-col bg-[#ece5dd]">
                        {selectedChat ? (
                            <>
                                {/* Header */}
                                <div class="p-4 bg-gray-100 border-b flex justify-between items-center">
                                    <div>
                                        <h2 class="font-bold text-lg">{selectedChat.user_identifier}</h2>
                                        <span class="text-xs text-gray-500">{selectedChat.channel}</span>
                                    </div>
                                    <button onClick={() => resolveChat(selectedChat.id)} class="bg-green-600 hover:bg-green-700 text-white text-sm px-4 py-2 rounded shadow">
                                        Resolve Chat
                                    </button>
                                </div>

                                {/* Messages */}
                                <div class="flex-1 overflow-y-auto p-4 chat-scroll flex flex-col gap-3">
                                    {selectedChat.messages.map((m, i) => (
                                        <div key={i} class={`max-w-[70%] p-3 rounded-lg shadow-sm text-sm ${
                                            m.sender === 'USER' ? 'bg-white self-start' :
                                            m.sender === 'AGENT' ? 'bg-[#dcf8c6] self-end' :
                                            'bg-gray-200 self-center text-center text-xs'
                                        }`}>
                                            {m.sender === 'BOT' && <div class="text-[10px] text-gray-500 font-bold mb-1">BOT REPLY</div>}
                                            {m.content}
                                        </div>
                                    ))}
                                    <div ref={chatEndRef} />
                                </div>

                                {/* Input */}
                                <div class="p-3 bg-gray-100 flex gap-2 items-center">
                                    <input
                                        type="text"
                                        value={replyText}
                                        onChange={e => setReplyText(e.target.value)}
                                        onKeyDown={e => e.key === 'Enter' && handleSend()}
                                        placeholder={canReply ? "Type a message..." : "Accept chat to reply as human"}
                                        disabled={!canReply}
                                        class="flex-1 p-3 rounded-full border-none outline-none focus:ring-2 focus:ring-green-500"
                                    />
                                    <button onClick={handleSend} disabled={!replyText.trim() || !canReply} class="bg-[#075E54] text-white p-3 rounded-full disabled:opacity-50">
                                        Send
                                    </button>
                                </div>
                            </>
                        ) : (
                            <div class="flex-1 flex items-center justify-center text-gray-500 flex-col gap-4">
                                <svg class="w-16 h-16 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                                <p>Select a chat from the queue to start messaging</p>
                            </div>
                        )}
                    </div>

                    {/* RIGHT PANE: CONTEXT */}
                    <div class="w-1/4 bg-white border-l flex flex-col">
                        <div class="p-4 bg-gray-50 border-b font-bold">User Context</div>
                        {selectedChat ? (
                            <div class="p-4 flex flex-col gap-4">
                                <div class="bg-blue-50 p-3 rounded border border-blue-100">
                                    <h3 class="text-xs font-bold text-blue-800 uppercase mb-1">Details</h3>
                                    <p class="text-sm"><strong>ID:</strong> {selectedChat.user_identifier}</p>
                                    <p class="text-sm"><strong>Source:</strong> {selectedChat.channel}</p>
                                    <p class="text-sm"><strong>Status:</strong> {selectedChat.status}</p>
                                </div>

                                <div>
                                    <h3 class="text-xs font-bold text-gray-500 uppercase mb-2">Quick Replies</h3>
                                    <div class="flex flex-col gap-2">
                                        <button onClick={() => setReplyText("Hello! How can I assist you today?")} class="text-left text-sm bg-gray-100 hover:bg-gray-200 p-2 rounded border">Greeting</button>
                                        <button onClick={() => setReplyText("Please provide your Demat account number so I can check.")} class="text-left text-sm bg-gray-100 hover:bg-gray-200 p-2 rounded border">Request Demat Info</button>
                                        <button onClick={() => setReplyText("I have resolved your issue. Let me know if you need anything else!")} class="text-left text-sm bg-gray-100 hover:bg-gray-200 p-2 rounded border">Closing</button>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div class="p-4 text-sm text-gray-400 text-center">No chat selected</div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
