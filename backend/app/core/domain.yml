version: "3.1"

responses:
  utter_location:
    en: "Global College of Management (GCM) is located in Mid-Baneshwor, Kathmandu."
    ne: "ग्लोबल कलेज अफ म्यानेजमेन्ट (GCM) काठमाडौंको मध्य-बानेश्वरमा अवस्थित छ।"
    ne_rom: "Global College of Management (GCM) Kathmandu ko Mid-Baneshwor ma chha."

  utter_medium_of_instruction:
    en: "Yes, GCM is a premier English-medium, co-educational institution."
    ne: "हो, GCM एक उत्कृष्ट अङ्ग्रेजी माध्यमको सह-शिक्षा प्रदान गर्ने संस्था हो।"
    ne_rom: "Ho, GCM ekdam ramro English-medium co-educational college ho."

  utter_operating_history:
    en: "GCM has over 21+ years of experience in providing higher education."
    ne: "GCM सँग उच्च शिक्षा प्रदान गर्ने २१ वर्षभन्दा बढीको अनुभव छ।"
    ne_rom: "GCM ko higher education ma 21 barsa bhanda dherai ko anubhav chha."

  utter_contact_info:
    en: "You can reach us at 01-5970316 or 9801912902, or email info@globalcollege.edu.np."
    ne: "तपाईँ हामीलाई ०१-५९७०३१६ वा ९८०११२९०२ मा सम्पर्क गर्न सक्नुहुन्छ, वा info@globalcollege.edu.np मा इमेल गर्न सक्नुहुन्छ।"
    ne_rom: "Tapai hamilai 01-5970316 wa 9801912902 ma phone garna saknuhunchha, wa info@globalcollege.edu.np ma email garna saknuhunchha."

  utter_campus_tour:
    en: "Yes, campus visits can be scheduled, and a Virtual Tour is available on our official website."
    ne: "हो, कलेज भ्रमणको समय मिलाउन सकिन्छ, र हाम्रो आधिकारिक वेबसाइटमा भर्चुअल टुर पनि उपलब्ध छ।"
    ne_rom: "Ho, campus visit garna milchha, ra website ma Virtual Tour pani herna saknuhunchha."

  utter_admission_apply:
    en: "You can apply online through the 'Apply to GCM' or 'Inquire Now' portals on our website."
    ne: "तपाईँ हाम्रो वेबसाइटको 'Apply to GCM' वा 'Inquire Now' पोर्टल मार्फत अनलाइन आवेदन दिन सक्नुहुन्छ।"
    ne_rom: "Tapai hamro website ko 'Apply to GCM' wa 'Inquire Now' portal bata online form bharna saknuhunchha."

  utter_admission_eligibility:
    en: "Eligibility for +2 Management depends on your SEE results. Please contact our admission desk for specific GPA requirements."
    ne: "+२ म्यानेजमेन्टका लागि योग्यता तपाईँको SEE नतिजामा निर्भर गर्दछ। विस्तृत जानकारीका लागि हाम्रो भर्ना शाखामा सम्पर्क गर्नुहोस्।"
    ne_rom: "+2 Management join garna tapai ko SEE results herinchha. Detail GPA criteria ko lagi admission desk ma kura garnu hola."

  utter_entrance_exam:
    en: "Yes, there is a mandatory entrance examination for all new admissions at GCM."
    ne: "हो, GCM मा सबै नयाँ विद्यार्थीहरूको लागि अनिवार्य इन्ट्रान्स परीक्षा हुन्छ।"
    ne_rom: "Ho, GCM ma naya admission ko lagi mandatory entrance exam dinuparchha."

  utter_scholarship_info:
    en: "GCM offers various scholarships including merit-based and quota-based options for deserving students."
    ne: "GCM ले जेहेन्दार विद्यार्थीहरूका लागि मेरिट र कोटा आधारित विभिन्न छात्रवृत्तिहरू प्रदान गर्दछ।"
    ne_rom: "GCM ma merit ra quota-based scholarship ko subidha chha."

  utter_ca_preparation:
    en: "GCM is well-known for laying a strong foundation for CA students through dedicated guidance and resources."
    ne: "GCM विशेष गरी सीए (CA) अध्ययन गर्न चाहने विद्यार्थीहरूको लागि बलियो जग बसाल्न प्रसिद्ध छ।"
    ne_rom: "GCM CA padhne biddyarthi haru ko lagi ramro foundation basaalna dherai popular chha."

  utter_sports_facilities:
    en: "We feature extensive sports facilities including Basketball and Criksal/Futsal, and host regular tournaments."
    ne: "हामीसँग बास्केटबल र क्रिकसल/फुटसल लगायतका व्यापक खेलकुद सुविधाहरू छन्, र हामी नियमित प्रतियोगिताहरू आयोजना गर्छौं।"
    ne_rom: "Hamro ma Basketball ra Criksal/Futsal ko ramro facility chha, ra regular tournaments pani hunchha."

  utter_student_clubs:
    en: "Students can join various clubs like the Global Debate Club, Music Club, Social Club, and Literary Club."
    ne: "विद्यार्थीहरूले ग्लोबल डिबेट क्लब, म्युजिक क्लब, सोसल क्लब, र साहित्यिक क्लब जस्ता विभिन्न क्लबहरूमा सहभागी हुन सक्छन्।"
    ne_rom: "Students haru le Global Debate Club, Music Club, Social Club, ra Literary Club jasta dherai clubs haru join garna sakchhan."

  utter_contact_support:
    en: "I can connect you to a college admission officer. Please share your phone number."
    ne: "म तपाईँलाई कलेजको भर्ना अधिकृतसँग जोड्न सक्छु। कृपया आफ्नो सम्पर्क नम्बर दिनुहोस्।"
    ne_rom: "Ma tapai lai college ko admission officer sanga jodna sakchu. Kripaya afno contact number dinuhos."

  utter_default_fallback:
    en: "I'm sorry, I didn't quite understand that. Connecting you to a college representative for assistance."
    ne: "माफ गर्नुहोस्, मैले त्यो बुझिन। थप सहयोगको लागि म तपाईँलाई कलेजको प्रतिनिधि सँग जोड्दै छु।"
    ne_rom: "Maaf garnuhos, maile tyo bujhina. Thap sahayog ko lagi ma tapai lai college representative sanga joddai chhu."
